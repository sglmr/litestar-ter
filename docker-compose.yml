services:
  app:
    build:
      context: .
      target: dev
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    env_file: .env
    tmpfs:
      - /tmp/app_cache:size=512M,mode=1777

  tailwind:
    image: node:slim
    working_dir: /app
    tty: true           
    stdin_open: true
    volumes:
      - .:/app
      - /app/node_modules
    command: >
      sh -c "npm install && npx @tailwindcss/cli --input ./static/tailwind.css --output ./static/style.css --watch"
    depends_on:
      - app
