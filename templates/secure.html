{% extends "base.html" %}

{% block content %}
<div class="grid md:grid-cols-2 gap-12">
    
    <div>
        <h2 class="text-xl font-bold mb-4">Add New User</h2>
        <form hx-post="/users" hx-target="#user-list" hx-swap="outerHTML" class="flex gap-2">
            <input type="text" name="username" required placeholder="Name..." 
                   class="flex-1 border border-slate-300 rounded-md p-2 outline-indigo-600">
            <button type="submit" class="bg-indigo-600 text-white px-4 py-2 rounded-md font-bold hover:bg-indigo-700">
                Add
            </button>
        </form>
    </div>

    <div>
        <h2 class="text-xl font-bold mb-4">Active Users</h2>
        {% include 'users_list.html' %}
    </div>

</div>
{% endblock %}
