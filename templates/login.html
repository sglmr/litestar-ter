{% extends "base.html" %}

{% block content %}
<div class="max-w-md mx-auto">
    <div class="bg-white border border-slate-200 rounded-xl p-8 shadow-sm">
        <h1 class="text-2xl font-bold mb-6">Sign In</h1>

        <form method="POST" action="/login" class="space-y-4" >
            {{ csrf_input | safe }}
            
            <div>
                <label class="block text-sm font-semibold mb-1 text-slate-700">Username</label>
                <input type="text" name="username" required 
                       class="w-full border border-slate-300 rounded-md p-2 focus:ring-2 focus:ring-indigo-500 outline-none">
            </div>

            <div>
                <label class="block text-sm font-semibold mb-1 text-slate-700">Password</label>
                <input type="password" name="password" required 
                       class="w-full border border-slate-300 rounded-md p-2 focus:ring-2 focus:ring-indigo-500 outline-none">
            </div>

            <button type="submit" 
                    class="w-full bg-indigo-600 text-white font-bold py-2 rounded-md hover:bg-indigo-700 transition duration-200">
                Log In
            </button>
        </form>
    </div>
</div>
{% endblock %}
